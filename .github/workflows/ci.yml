name: Flipkart Daily Scraper
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    # ✅ Step 1: Setup SSH
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/id_ed25519
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    # ✅ Step 2: Clone private repo
    - name: Clone private repo
      run: |
        git clone git@github.com:LongwayDataTeam/Amz_Flp_Data_Scraper.git

    # ✅ Step 3: Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: "pip"

    # ✅ Step 4: Install Python dependencies
    - name: Install Python dependencies
      run: |
        cd Amz_Flp_Data_Scraper
        pip install --upgrade pip
        pip install -r requirements.txt

    # ✅ Step 5: Install Playwright + its own bundled Chromium
    # This is completely independent of system Chrome — no version conflicts ever
    - name: Install Playwright browsers
      run: |
        playwright install chromium --with-deps
        echo "✅ Playwright Chromium installed"

    # ✅ Step 6: Run scraper script
    - name: Run scraping script
      env:
        GSHEET_CREDENTIALS: ${{ secrets.GSHEET_CREDENTIALS }}
        PYTHONUNBUFFERED: "1"
      run: |
        cd Amz_Flp_Data_Scraper
        python amz_flp_data_scraper.py
